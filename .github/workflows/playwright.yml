name: Playwright tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # these will be populated from the repository secrets (see next step)
      TEST_USER: eve.holt@reqres.in
      TEST_PASS: cityslicka

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers and dependencies
        run: npx playwright install --with-deps

      - name: Run Playwright tests (headless)
        run: npx playwright test --workers=2

      - name: Upload Playwright JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-results
          path: test-results/**/*.xml

      - name: Upload Playwright HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: reports/html

      - name: Upload Playwright videos/screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-media
          path: test-results/**/video.webm,test-results/**/test-failed-*.png